  - streamsets_stage: "com.streamsets.pipeline.stage.processor.fieldflattener.FieldFlattenerDProcessor"
    streamsets_label: "Field Flattener"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark struct flattening with select + col"
    confidence: "medium"
    code_template: |
      # Field Flattener → Flatten nested structs
      from pyspark.sql.functions import col

      def flatten_schema(df, prefix=""):
          """Recursively flatten nested struct columns."""
          cols = []
          for field in df.schema.fields:
              name = f"{prefix}{field.name}" if prefix else field.name
              if str(field.dataType).startswith("StructType"):
                  for sub in field.dataType.fields:
                      cols.append(col(f"`{field.name}`.`{sub.name}`").alias(f"{name}__{sub.name}"))
              else:
                  cols.append(col(f"`{field.name}`").alias(name))
          return df.select(cols)

      df = flatten_schema(df)
    config_mapping:
      fields: "fields_to_flatten"
    notes: "The separator in flattened names defaults to '__'. Adjust to match downstream expectations."
    requires_manual_review: false

