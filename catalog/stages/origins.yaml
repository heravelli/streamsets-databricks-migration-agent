    databricks_equivalent: "autoloader"
    databricks_label: "Databricks Autoloader (GCS)"
    confidence: "high"
    code_template: |
      # Google Cloud Storage Origin → Databricks Autoloader
      df = (spark.readStream
               .format("cloudFiles")
               .option("cloudFiles.format", "{{ file_format | default('json') }}")
               .option("cloudFiles.schemaLocation", "{{ schema_location }}")
               .load("gs://{{ bucket }}/{{ prefix }}"))
    config_mapping:
      gcsOriginConfig.bucketTemplate: "bucket"
      gcsOriginConfig.commonPrefix: "prefix"
      dataFormatConfig.dataFormat: "file_format"
    notes: "Configure GCS credentials via Databricks instance profile or Secrets."
    requires_manual_review: false

