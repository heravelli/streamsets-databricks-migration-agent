stages:
  - streamsets_stage: "com.streamsets.pipeline.stage.destination.jdbc.JdbcDTarget"
    streamsets_label: "JDBC Producer"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark JDBC write"
    confidence: "high"
    code_template: |
      # JDBC Producer → Spark JDBC write
      (df.write
         .format("jdbc")
         .option("url", "{{ jdbc_url }}")
         .option("dbtable", "{{ schema }}.{{ table_name }}")
         .option("user", "{{ username }}")
         .option("password", dbutils.secrets.get("{{ scope }}", "{{ secret_key }}"))
         .mode("{{ write_mode | default('append') }}")
         .save())
    config_mapping:
      hikariConfigBean.connectionString: "jdbc_url"
      tableNameTemplate: "table_name"
    notes: "Replace 'append' with 'overwrite' or 'merge' depending on pipeline semantics."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.kafka.KafkaDTarget"
    streamsets_label: "Kafka Producer"
    databricks_equivalent: "kafka_streaming"
    databricks_label: "Spark Structured Streaming Kafka write"
    confidence: "exact"
    code_template: |
      # Kafka Producer → Spark Structured Streaming write to Kafka
      (df.selectExpr("CAST({{ key_field }} AS STRING) AS key",
                     "to_json(struct(*)) AS value")
         .writeStream
         .format("kafka")
         .option("kafka.bootstrap.servers", "{{ bootstrap_servers }}")
         .option("topic", "{{ topic }}")
         .option("checkpointLocation", "{{ checkpoint_path }}")
         .start())
    config_mapping:
      kafkaConfigBean.metadataBrokerList: "bootstrap_servers"
      topic: "topic"
    notes: "Adjust key serialization based on original pipeline key configuration."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.s3.AmazonS3DTarget"
    streamsets_label: "Amazon S3"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark write to S3"
    confidence: "high"
    code_template: |
      # Amazon S3 → Spark write to S3
      (df.write
         .format("{{ output_format | default('parquet') }}")
         .mode("{{ write_mode | default('append') }}")
         .option("path", "s3a://{{ bucket }}/{{ prefix }}")
         .partitionBy("{{ partition_columns | join('", "') }}")
         .save())
    config_mapping:
      s3TargetConfigBean.s3Config.bucket: "bucket"
      s3TargetConfigBean.s3Config.commonPrefix: "prefix"
    notes: "Ensure S3 credentials are configured via Databricks instance profile or Secrets."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.localfilesystem.LocalFileSystemDTarget"
    streamsets_label: "Local FS"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark write to DBFS or mounted storage"
    confidence: "high"
    code_template: |
      # Local FS → Databricks DBFS / mounted storage
      (df.write
         .format("{{ output_format | default('parquet') }}")
         .mode("{{ write_mode | default('append') }}")
         .save("{{ dbfs_path }}"))
    config_mapping:
      fileNameConfig.dirPathTemplate: "output_dir"
      dataFormatConfig.dataFormat: "output_format"
    notes: "Replace local filesystem paths with DBFS or mounted Azure/S3 paths."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.elasticsearch.ElasticSearchDTarget"
    streamsets_label: "Elasticsearch"
    databricks_equivalent: "custom_python"
    databricks_label: "elasticsearch-py bulk indexing"
    confidence: "medium"
    code_template: |
      # Elasticsearch → elasticsearch-py
      from elasticsearch import Elasticsearch, helpers

      es = Elasticsearch([{"host": "{{ es_host }}", "port": {{ es_port | default(9200) }}}])

      def write_to_es(batch_df, batch_id):
          records = [row.asDict() for row in batch_df.collect()]
          actions = [
              {"_index": "{{ index_name }}", "_id": r.get("{{ id_field }}"), "_source": r}
              for r in records
          ]
          helpers.bulk(es, actions)

      df.writeStream.foreachBatch(write_to_es).start()
    config_mapping:
      elasticSearchConfig.httpUris: "es_host"
      elasticSearchConfig.indexTemplate: "index_name"
    notes: "For streaming pipelines, use foreachBatch. Install elasticsearch library on cluster."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.mongodb.MongoDBDTarget"
    streamsets_label: "MongoDB"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark MongoDB Connector write"
    confidence: "high"
    code_template: |
      # MongoDB → Spark MongoDB Connector write
      (df.write
         .format("mongodb")
         .option("spark.mongodb.write.connection.uri", "{{ connection_uri }}")
         .option("spark.mongodb.write.database", "{{ database }}")
         .option("spark.mongodb.write.collection", "{{ collection }}")
         .mode("append")
         .save())
    config_mapping:
      configBean.mongoConfig.connectionString: "connection_uri"
      configBean.mongoConfig.database: "database"
      configBean.mongoConfig.collection: "collection"
    notes: "Requires spark-mongodb-connector library on the cluster."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.http.HttpClientDTarget"
    streamsets_label: "HTTP Client (Destination)"
    databricks_equivalent: "custom_python"
    databricks_label: "Python requests in foreachBatch"
    confidence: "medium"
    code_template: |
      # HTTP Client Destination → requests in foreachBatch
      import requests

      def post_to_api(batch_df, batch_id):
          records = [row.asDict() for row in batch_df.collect()]
          for record in records:
              resp = requests.post(
                  "{{ url }}",
                  json=record,
                  headers={{ headers | tojson }},
                  timeout=30
              )
              resp.raise_for_status()

      df.writeStream.foreachBatch(post_to_api).start()
    config_mapping:
      conf.resourceUrl: "url"
    notes: "Use foreachBatch for streaming. Add retry logic and error handling."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.hive.HiveMetastoreDTarget"
    streamsets_label: "Hive Metastore"
    databricks_equivalent: "delta_merge"
    databricks_label: "Delta Lake write via Spark SQL"
    confidence: "high"
    code_template: |
      # Hive Metastore → Delta Lake
      df.write.format("delta").mode("{{ write_mode | default('append') }}").saveAsTable("{{ database }}.{{ table_name }}")
    config_mapping:
      conf.dbNameEL: "database"
      conf.tableNameEL: "table_name"
    notes: "Delta Lake replaces Hive on Databricks. Use Unity Catalog for governance."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.snowflake.SnowflakeDTarget"
    streamsets_label: "Snowflake"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark Snowflake Connector write"
    confidence: "high"
    code_template: |
      # Snowflake → Spark Snowflake Connector
      snowflake_options = {
          "sfURL": "{{ sf_url }}",
          "sfAccount": "{{ sf_account }}",
          "sfUser": "{{ sf_user }}",
          "sfPassword": dbutils.secrets.get("{{ scope }}", "sf_password"),
          "sfDatabase": "{{ sf_database }}",
          "sfSchema": "{{ sf_schema }}",
          "sfWarehouse": "{{ sf_warehouse }}"
      }
      (df.write
         .format("net.snowflake.spark.snowflake")
         .options(**snowflake_options)
         .option("dbtable", "{{ sf_table }}")
         .mode("append")
         .save())
    config_mapping:
      connection.connectionString: "sf_url"
    notes: "Requires snowflake-spark-connector. Consider using Databricks-to-Snowflake data sharing instead."
    requires_manual_review: false
