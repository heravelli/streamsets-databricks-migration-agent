  - streamsets_stage: "com.streamsets.pipeline.stage.processor.mongodb.MongoDBDProcessor"
    streamsets_label: "MongoDB Lookup (Processor)"
    databricks_equivalent: "custom_python"
    databricks_label: "PyMongo lookup via UDF or foreachBatch"
    confidence: "medium"
    code_template: |
      # MongoDB Lookup Processor → PyMongo lookup
      # WARNING: Per-row MongoDB lookups are slow — batch via foreachBatch for streaming
      import pymongo
      from pyspark.sql.functions import udf
      from pyspark.sql.types import StringType

      mongo_uri = dbutils.secrets.get("{{ scope }}", "mongodb_uri")

      @udf(returnType=StringType())
      def mongo_lookup(key_value):
          client = pymongo.MongoClient(mongo_uri)
          doc = client["{{ database }}"]["{{ collection }}"].find_one({"{{ lookup_key }}": key_value})
          return str(doc.get("{{ return_field }}", "")) if doc else None

      df = df.withColumn("{{ output_field }}", mongo_lookup(df["{{ join_key }}"]))
    config_mapping:
      mongoConfig.database: "database"
      mongoConfig.collection: "collection"
    notes: "Per-row lookups are slow. Pre-join the MongoDB collection as a broadcast DataFrame where possible."
    requires_manual_review: true

