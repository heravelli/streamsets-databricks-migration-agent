    notes: "Replace with Databricks Job schedule trigger. No code needed — configure in Job settings UI."
    requires_manual_review: true

  - streamsets_stage: "com.streamsets.pipeline.stage.origin.startJob.StartJobDSource"
    streamsets_label: "Start Job Origin"
    databricks_equivalent: "custom_python"
    databricks_label: "Databricks Jobs API / dbutils.notebook.run"
    confidence: "medium"
    code_template: |
      # Start Job Origin → Databricks Jobs API
      import requests

      # Trigger a Databricks Job run via REST API
      job_api_url = f"{dbutils.notebook.entry_point.getDbutils().notebook().getContext().apiUrl().get()}/api/2.1/jobs/run-now"
      token = dbutils.notebook.entry_point.getDbutils().notebook().getContext().apiToken().get()

      response = requests.post(
          job_api_url,
          headers={"Authorization": f"Bearer {token}"},
          json={"job_id": {{ job_id }}}
      )
      response.raise_for_status()
      run_id = response.json()["run_id"]
      print(f"Triggered job run: {run_id}")
    config_mapping:
      conf.jobId: "job_id"
    notes: "Use Databricks Jobs API to trigger downstream jobs. Consider Workflows for orchestration."
    requires_manual_review: false
