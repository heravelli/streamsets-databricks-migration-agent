  - streamsets_stage: "com.streamsets.pipeline.stage.origin.eventhubs.EventHubConsumerDSource"
    streamsets_label: "Azure Event Hubs Consumer"
    databricks_equivalent: "dlt_streaming_table"
    databricks_label: "Delta Live Tables Streaming Table (Event Hubs via Kafka protocol)"
    confidence: "high"
    code_template: |
      import dlt
      from pyspark.sql.functions import col

      # Azure Event Hubs Consumer → DLT via Kafka protocol endpoint
      @dlt.table(
          name="{{ table_name }}",
          comment="Migrated from StreamSets Azure Event Hubs Consumer"
      )
      def {{ table_name }}():
          return (spark.readStream
                      .format("kafka")
                      .option("kafka.bootstrap.servers", "{{ event_hub_namespace }}.servicebus.windows.net:9093")
                      .option("subscribe", "{{ event_hub_name }}")
                      .option("kafka.security.protocol", "SASL_SSL")
                      .option("kafka.sasl.mechanism", "PLAIN")
                      .option("kafka.sasl.jaas.config",
                              f"kafkashaded.org.apache.kafka.common.security.plain.PlainLoginModule required "
                              f"username=\"$ConnectionString\" "
                              f"password=\"{dbutils.secrets.get('{{ scope }}', 'eventhub_connection_string')}\";")
                      .load())
    config_mapping:
      conf.namespaceName: "event_hub_namespace"
      conf.eventHubName: "event_hub_name"
      conf.sasKey: "sas_key"
    notes: "Event Hubs exposes a Kafka-compatible endpoint. Use the Kafka protocol for Structured Streaming."
    requires_manual_review: false

