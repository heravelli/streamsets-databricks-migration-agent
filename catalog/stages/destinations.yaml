# Destinations catalog — all 18 destination stages used across 2000 pipelines.
# Source: streamsets_stages.md (authoritative list)
# Note: BigQueryDTarget and GoogleCloudStorageDTarget are listed under Executor in streamsets_stages.md
#       but are destination stages — they are cataloged here.

stages:
  - streamsets_stage: "com.streamsets.pipeline.stage.destination.datalake.gen2.DataLakeGen2DTarget"
    streamsets_label: "Azure Data Lake Storage Gen2"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark write to ADLS Gen2"
    confidence: "high"
    code_template: |
      # ADLS Gen2 Destination → Spark write to ADLS Gen2
      (df.write
         .format("{{ output_format | default('delta') }}")
         .mode("{{ write_mode | default('append') }}")
         .option("path", "abfss://{{ container }}@{{ account }}.dfs.core.windows.net/{{ path }}")
         .save())
    config_mapping:
      dataLakeTargetConfig.storageAccount: "account"
      dataLakeTargetConfig.fileSystem: "container"
      dataLakeTargetConfig.dirPathTemplate: "path"
      dataFormatConfig.dataFormat: "output_format"
    notes: "Use Delta format for Unity Catalog registration. Configure ADLS credentials via Databricks Secrets or instance profile."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.devnull.NullDTarget"
    streamsets_label: "Trash (Discard)"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "No-op (drop records)"
    confidence: "exact"
    code_template: |
      # Trash / Discard Destination → no-op
      # Records routed to Trash are intentionally discarded.
      # In Databricks, simply do not write this DataFrame branch.
      # If you need to count discarded records for monitoring:
      discarded_count = df.count()
      print(f"Discarded {discarded_count} records (Trash destination)")
    config_mapping: {}
    notes: "No write needed — just drop this branch. Log the count for observability if required."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.eventhubs.EventHubProducerDTarget"
    streamsets_label: "Azure Event Hubs Producer"
    databricks_equivalent: "kafka_streaming"
    databricks_label: "Spark Structured Streaming write to Event Hubs (Kafka protocol)"
    confidence: "high"
    code_template: |
      # Event Hubs Producer → Spark Structured Streaming write via Kafka protocol
      (df.selectExpr("CAST({{ key_field | default('id') }} AS STRING) AS key",
                     "to_json(struct(*)) AS value")
         .writeStream
         .format("kafka")
         .option("kafka.bootstrap.servers",
                 "{{ event_hub_namespace }}.servicebus.windows.net:9093")
         .option("topic", "{{ event_hub_name }}")
         .option("kafka.security.protocol", "SASL_SSL")
         .option("kafka.sasl.mechanism", "PLAIN")
         .option("kafka.sasl.jaas.config",
                 f"kafkashaded.org.apache.kafka.common.security.plain.PlainLoginModule required "
                 f"username=\"$ConnectionString\" "
                 f"password=\"{dbutils.secrets.get('{{ scope }}', 'eventhub_connection_string')}\";")
         .option("checkpointLocation", "{{ checkpoint_path }}")
         .start())
    config_mapping:
      conf.namespaceName: "event_hub_namespace"
      conf.eventHubName: "event_hub_name"
    notes: "Event Hubs exposes a Kafka endpoint. Use the Kafka Structured Streaming connector."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.fragment.FragmentTarget"
    streamsets_label: "Fragment Target"
    databricks_equivalent: "custom_python"
    databricks_label: "Databricks Notebook output / shared module return"
    confidence: "low"
    code_template: |
      # Fragment Target → Output boundary of a shared Fragment pipeline
      # In Databricks: the fragment's output DataFrame is returned from the shared notebook/module.
      # The parent pipeline receives it via the %run or import mechanism.
      #
      # In the shared module:
      #   def run(df): ... return df_transformed
      #
      # In the parent notebook:
      #   from shared.fragment_name import run
      #   df_out = run(df_in)
      #
      # TODO: Define the output contract for this fragment
      raise NotImplementedError("Fragment Target: define output DataFrame contract")
    config_mapping: {}
    notes: "Fragment Target marks the output of a reusable pipeline segment. Convert to a shared Python function return."
    requires_manual_review: true

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.http.HttpClientDTarget"
    streamsets_label: "HTTP Client (Destination)"
    databricks_equivalent: "custom_python"
    databricks_label: "Python requests in foreachBatch"
    confidence: "medium"
    code_template: |
      # HTTP Client Destination → Python requests via foreachBatch
      import requests

      def post_to_api(batch_df, batch_id):
          records = [row.asDict() for row in batch_df.collect()]
          for record in records:
              resp = requests.{{ http_method | default('post') }}(
                  "{{ url }}",
                  json=record,
                  headers={{ headers | default({}) | tojson }},
                  timeout=30
              )
              resp.raise_for_status()

      # For streaming:
      df.writeStream.foreachBatch(post_to_api).option("checkpointLocation", "{{ checkpoint_path }}").start()
      # For batch:
      # post_to_api(df, 0)
    config_mapping:
      conf.resourceUrl: "url"
      conf.httpMethod: "http_method"
      conf.headers: "headers"
    notes: "Use foreachBatch for streaming. Add retry and error handling for production use."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.jdbc.JdbcDTarget"
    streamsets_label: "JDBC Producer"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark JDBC write"
    confidence: "high"
    code_template: |
      # JDBC Producer → Spark JDBC write
      (df.write
         .format("jdbc")
         .option("url", "{{ jdbc_url }}")
         .option("dbtable", "{{ schema }}.{{ table_name }}")
         .option("user", "{{ username }}")
         .option("password", dbutils.secrets.get("{{ scope }}", "{{ secret_key }}"))
         .mode("{{ write_mode | default('append') }}")
         .save())
    config_mapping:
      hikariConfigBean.connectionString: "jdbc_url"
      tableNameTemplate: "table_name"
      schema: "schema"
    notes: "Use 'append' for inserts, 'overwrite' for full refresh. For upserts, use Delta MERGE INTO."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.jms.JmsDTarget"
    streamsets_label: "JMS Producer"
    databricks_equivalent: "custom_python"
    databricks_label: "Custom Python JMS publish (manual)"
    confidence: "low"
    code_template: |
      # JMS Producer → No native Databricks connector
      # TODO: Consider migrating the message sink to Kafka or Event Hubs,
      # then use the standard Structured Streaming Kafka write connector.
      #
      # If JMS must be kept:
      # import stomp
      # conn = stomp.Connection([("{{ broker_host }}", {{ broker_port | default(61616) }})])
      # conn.connect("{{ username }}", dbutils.secrets.get("{{ scope }}", "jms_password"))
      # def send_message(batch_df, batch_id):
      #     for row in batch_df.collect():
      #         conn.send("{{ destination }}", str(row.asDict()))
      raise NotImplementedError("JMS Producer: no native Databricks connector — consider migrating to Kafka")
    config_mapping:
      conf.brokerUrl: "broker_url"
      conf.destinationName: "destination"
    notes: "JMS has no native Databricks connector. Recommend bridging to Kafka or Event Hubs."
    requires_manual_review: true

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.kafka.KafkaDTarget"
    streamsets_label: "Kafka Producer"
    databricks_equivalent: "kafka_streaming"
    databricks_label: "Spark Structured Streaming write to Kafka"
    confidence: "exact"
    code_template: |
      # Kafka Producer → Spark Structured Streaming write to Kafka
      (df.selectExpr(
              "CAST({{ key_field | default('id') }} AS STRING) AS key",
              "to_json(struct(*)) AS value"
          )
         .writeStream
         .format("kafka")
         .option("kafka.bootstrap.servers", "{{ bootstrap_servers }}")
         .option("topic", "{{ topic }}")
         .option("checkpointLocation", "{{ checkpoint_path }}")
         .start())
      # For batch write:
      # (df.selectExpr("CAST({{ key_field }} AS STRING) AS key", "to_json(struct(*)) AS value")
      #    .write.format("kafka")
      #    .option("kafka.bootstrap.servers", "{{ bootstrap_servers }}")
      #    .option("topic", "{{ topic }}")
      #    .save())
    config_mapping:
      kafkaConfigBean.metadataBrokerList: "bootstrap_servers"
      topic: "topic"
    notes: "Serialize the value as JSON. Adjust key serialization based on the original pipeline key configuration."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.localfilesystem.LocalFileSystemDTarget"
    streamsets_label: "Local FS"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark write to DBFS or mounted storage"
    confidence: "high"
    code_template: |
      # Local FS Destination → Spark write to DBFS or mounted storage
      (df.write
         .format("{{ output_format | default('parquet') }}")
         .mode("{{ write_mode | default('append') }}")
         .save("{{ dbfs_path }}"))
      # DBFS path examples:
      #   /dbfs/mnt/my-mount/output/
      #   dbfs:/user/hive/warehouse/my_table/
    config_mapping:
      fileNameConfig.dirPathTemplate: "output_dir"
      dataFormatConfig.dataFormat: "output_format"
    notes: "Replace local filesystem paths with DBFS paths (dbfs:/...) or mounted Azure/S3/GCS paths."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.mongodb.MongoDBDTarget"
    streamsets_label: "MongoDB"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark MongoDB Connector write"
    confidence: "high"
    code_template: |
      # MongoDB Destination → Spark MongoDB Connector write
      (df.write
         .format("mongodb")
         .option("spark.mongodb.write.connection.uri",
                 dbutils.secrets.get("{{ scope }}", "mongodb_uri"))
         .option("spark.mongodb.write.database", "{{ database }}")
         .option("spark.mongodb.write.collection", "{{ collection }}")
         .mode("{{ write_mode | default('append') }}")
         .save())
    config_mapping:
      configBean.mongoConfig.connectionString: "connection_uri"
      configBean.mongoConfig.database: "database"
      configBean.mongoConfig.collection: "collection"
