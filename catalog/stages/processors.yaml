      # Field Hasher → Spark cryptographic hash functions
      from pyspark.sql.functions import sha2, md5, col

      # SHA-256 (recommended):
      df = df.withColumn("{{ field }}", sha2(col("{{ field }}").cast("string"), 256))

      # MD5 (if required by existing pipeline):
      # df = df.withColumn("{{ field }}", md5(col("{{ field }}").cast("string")))
    config_mapping:
      fieldHasherConfigs: "hash_configs"
    notes: "SHA-256 is preferred. Check the pipeline for the configured hash type (MD5/SHA1/SHA256)."
    requires_manual_review: false

