# Origins catalog — all 20 origin stages used across 2000 pipelines.
# Source: streamsets_stages.md (authoritative list)
# FQCN format: underscores in stage IDs replaced with dots (Java class name convention)

stages:
  - streamsets_stage: "com.streamsets.pipeline.stage.bigquery.origin.BigQueryDSource"
    streamsets_label: "Google BigQuery"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark BigQuery Connector"
    confidence: "high"
    code_template: |
      # Google BigQuery Origin → Spark BigQuery connector
      df = (spark.read
               .format("bigquery")
               .option("table", "{{ project }}.{{ dataset }}.{{ table }}")
               .option("filter", "{{ row_filter | default('') }}")
               .load())
    config_mapping:
      projectId: "project"
      datasetName: "dataset"
      tableName: "table"
    notes: "Requires com.google.cloud.spark:spark-bigquery-with-dependencies on the cluster."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.cloudstorage.origin.GoogleCloudStorageDSource"
