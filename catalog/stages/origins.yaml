    code_template: |
      # Scheduled Push Source → Databricks Job with cron schedule
      # This stage triggers pipeline execution on a schedule.
      # In Databricks: configure a Job trigger (cron or file arrival) instead of embedding scheduling in code.
      #
      # The downstream pipeline logic runs as a Databricks Job task.
      # Set the Job schedule to: {{ cron_expression | default('0 * * * *') }}
      print("Scheduled execution started")
    config_mapping:
