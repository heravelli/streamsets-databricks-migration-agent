  - streamsets_stage: "com.streamsets.pipeline.stage.processor.expression.ExpressionDProcessor"
    streamsets_label: "Expression Evaluator"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark withColumn() with expr()"
    confidence: "high"
    code_template: |
      # Expression Evaluator → Spark withColumn / expr
      from pyspark.sql.functions import expr, col, lit, current_timestamp

      # One withColumn per expression config:
      df = df.withColumn("{{ output_field }}", expr("{{ spark_expression }}"))
      # StreamSets EL translation hints:
      #   ${record:value('/field')}  → col("field")
      #   ${str:concat(a, b)}        → concat(col("a"), col("b"))
      #   ${time:now()}              → current_timestamp()
      #   ${math:abs(x)}             → abs(col("x"))
    config_mapping:
      expressionProcessorConfigs: "expressions"
    notes: "Translate StreamSets EL (${...}) to Spark SQL expressions. Header attributes have no direct equivalent — use DataFrame columns."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.processor.fieldfilter.FieldFilterDProcessor"
