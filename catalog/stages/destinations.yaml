  - streamsets_stage: "com.streamsets.pipeline.stage.destination.remote.RemoteUploadDTarget"
    streamsets_label: "SFTP/FTP/FTPS Client (Destination)"
    databricks_equivalent: "custom_python"
    databricks_label: "Python paramiko/ftplib upload from DBFS"
    confidence: "medium"
    code_template: |
      # SFTP/FTP Destination → Python paramiko upload from DBFS
      import paramiko
      import os

      # Write DataFrame to DBFS first, then upload
      local_path = "/dbfs/tmp/{{ output_filename }}"
      df.write.format("{{ file_format | default('csv') }}").mode("overwrite").save(local_path)

      ssh = paramiko.SSHClient()
      ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())
      ssh.connect(
          hostname="{{ sftp_host }}",
          port={{ sftp_port | default(22) }},
          username="{{ sftp_user }}",
          password=dbutils.secrets.get("{{ scope }}", "sftp_password")
      )
      sftp = ssh.open_sftp()
      sftp.put(local_path, "{{ remote_path }}/{{ output_filename }}")
      sftp.close(); ssh.close()
    config_mapping:
      remoteConfig.remoteAddress: "sftp_host"
      remoteConfig.username: "sftp_user"
      remoteConfig.remoteDirectory: "remote_path"
    notes: "Install paramiko on the cluster. For managed SFTP, consider Azure Data Factory."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.snowflake.SnowflakeDTarget"
    streamsets_label: "Snowflake"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark Snowflake Connector write"
    confidence: "high"
    code_template: |
      # Snowflake Destination → Spark Snowflake Connector
      snowflake_options = {
          "sfURL": "{{ sf_account }}.snowflakecomputing.com",
          "sfAccount": "{{ sf_account }}",
          "sfUser": "{{ sf_user }}",
          "sfPassword": dbutils.secrets.get("{{ scope }}", "sf_password"),
          "sfDatabase": "{{ sf_database }}",
          "sfSchema": "{{ sf_schema }}",
          "sfWarehouse": "{{ sf_warehouse }}"
      }
      (df.write
         .format("net.snowflake.spark.snowflake")
         .options(**snowflake_options)
         .option("dbtable", "{{ sf_table }}")
         .mode("{{ write_mode | default('append') }}")
         .save())
    config_mapping:
      connection.connectionString: "sf_account"
      table: "sf_table"
    notes: "Requires net.snowflake:spark-snowflake and net.snowflake:snowflake-jdbc on the cluster."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.splunk.SplunkDTarget"
    streamsets_label: "Splunk"
    databricks_equivalent: "custom_python"
    databricks_label: "Python Splunk HEC write via foreachBatch"
    confidence: "medium"
    code_template: |
      # Splunk Destination → Splunk HTTP Event Collector (HEC)
      import requests
      import json

      splunk_hec_url = "{{ splunk_hec_url }}"
      splunk_token = dbutils.secrets.get("{{ scope }}", "splunk_hec_token")

      def write_to_splunk(batch_df, batch_id):
          records = [row.asDict() for row in batch_df.collect()]
          events = [{"event": record, "sourcetype": "{{ source_type | default('_json') }}"} for record in records]
          payload = "\n".join(json.dumps(e) for e in events)
          resp = requests.post(
              f"{splunk_hec_url}/services/collector/event",
              headers={"Authorization": f"Splunk {splunk_token}"},
              data=payload,
              timeout=30
          )
          resp.raise_for_status()

      df.writeStream.foreachBatch(write_to_splunk).option("checkpointLocation", "{{ checkpoint_path }}").start()
    config_mapping:
      conf.hecEndpoint: "splunk_hec_url"
      conf.token: "splunk_token"
    notes: "Use Splunk HEC for real-time event indexing. Batch events to reduce API call overhead."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.toerror.ToErrorDTarget"
    streamsets_label: "To Error"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "DLT expectations quarantine / error Delta table write"
    confidence: "high"
    code_template: |
      # To Error Destination → Write failed records to error/quarantine table
      # Option 1: Write error records to a Delta quarantine table
      (df.write
         .format("delta")
         .mode("append")
         .option("path", "{{ error_table_path | default('dbfs:/error_records/quarantine') }}")
         .save())

      # Option 2: DLT expectations (recommended for DLT pipelines)
      # @dlt.expect_or_drop("valid_record", "{{ validation_condition }}")
      # Invalid records are automatically quarantined to _rescue_data

      # Option 3: Raise exception to fail the pipeline
      # error_count = df.count()
      # if error_count > 0:
      #     raise RuntimeError(f"{error_count} records routed to error destination")
    config_mapping: {}
    notes: "Choose quarantine table or DLT expectations based on pipeline type. Log error records for debugging."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.destination.pubsub.PubSubDTarget"
    streamsets_label: "Google Cloud Pub/Sub"
    databricks_equivalent: "custom_python"
    databricks_label: "google-cloud-pubsub publisher via foreachBatch"
    confidence: "medium"
    code_template: |
      # Google Cloud Pub/Sub Destination → google-cloud-pubsub publisher
      from google.cloud import pubsub_v1
      import json

      project_id = "{{ gcp_project }}"
      topic_id = "{{ pubsub_topic }}"
      publisher = pubsub_v1.PublisherClient()
      topic_path = publisher.topic_path(project_id, topic_id)

      def publish_to_pubsub(batch_df, batch_id):
          futures = []
          for row in batch_df.collect():
              data = json.dumps(row.asDict()).encode("utf-8")
              futures.append(publisher.publish(topic_path, data))
          for f in futures:
              f.result()  # wait for all publishes to complete

      df.writeStream.foreachBatch(publish_to_pubsub).option("checkpointLocation", "{{ checkpoint_path }}").start()
    config_mapping:
      conf.projectId: "gcp_project"
      conf.topicId: "pubsub_topic"
    notes: "Install google-cloud-pubsub on the cluster. GCP credentials via Databricks service account."
    requires_manual_review: false

