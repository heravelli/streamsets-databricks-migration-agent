      # Field Type Converter → Spark cast
      from pyspark.sql.functions import col

      # One withColumn per field conversion:
      df = df.withColumn("{{ field_name }}", col("{{ field_name }}").cast("{{ target_type }}"))
      # Common type mappings:
      #   STRING     → StringType()  / "string"
      #   INTEGER    → IntegerType() / "int"
      #   LONG       → LongType()    / "long"
      #   DOUBLE     → DoubleType()  / "double"
      #   DECIMAL    → DecimalType(precision, scale)
      #   DATE       → DateType()    / "date"
      #   DATETIME   → TimestampType() / "timestamp"
      #   BOOLEAN    → BooleanType() / "boolean"
    config_mapping:
      conversions: "field_conversions"
    notes: "Generate one withColumn per field in the conversions list. Use col().cast() for each."
    requires_manual_review: false

