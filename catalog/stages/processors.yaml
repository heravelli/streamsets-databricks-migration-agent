  - streamsets_stage: "com.streamsets.pipeline.stage.processor.jdbclookup.JdbcLookupDProcessor"
    streamsets_label: "JDBC Lookup"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark JDBC join (broadcast)"
    confidence: "high"
    code_template: |
      # JDBC Lookup Processor → Spark broadcast join against JDBC table
      lookup_df = (spark.read
                      .format("jdbc")
                      .option("url", "{{ jdbc_url }}")
                      .option("dbtable", "{{ lookup_table }}")
                      .option("user", "{{ username }}")
                      .option("password", dbutils.secrets.get("{{ scope }}", "{{ secret_key }}"))
                      .load())

      df = df.join(
          lookup_df.hint("broadcast"),
          df["{{ join_key }}"] == lookup_df["{{ lookup_key }}"],
          how="{{ join_type | default('left') }}"
      )
    config_mapping:
      hikariConfigBean.connectionString: "jdbc_url"
      queries: "lookup_query"
      columnMappings: "column_mappings"
    notes: "Cache the lookup table as a broadcast join for small lookup tables. For large tables, use Delta table joins."
    requires_manual_review: false

