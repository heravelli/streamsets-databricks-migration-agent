      # df = df.withColumn("{{ output_field }}", from_csv(col("{{ input_field }}"), schema_str))

      # Avro format (streaming):
      # from pyspark.sql.functions import from_avro
      # df = df.withColumn("{{ output_field }}", from_avro(col("{{ input_field }}"), avro_schema_str))
    config_mapping:
      dataFormatConfig.dataFormat: "data_format"
      fieldPathToRead: "input_field"
    notes: "Select the correct parsing function based on dataFormatConfig.dataFormat in the pipeline JSON."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.processor.schemagen.SchemaGeneratorDProcessor"
    streamsets_label: "Schema Generator"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark schema inference / schema_of_json()"
    confidence: "medium"
    code_template: |
      # Schema Generator → Spark schema inference
      from pyspark.sql.functions import schema_of_json, col

      # Infer schema from a JSON string column:
      sample = df.select("{{ json_field }}").head(1)[0][0]
      inferred_schema = schema_of_json(sample)

      # Or get the DataFrame schema as a DDL string:
      schema_ddl = df.schema.simpleString()
      print(f"Inferred schema: {schema_ddl}")

      # In Unity Catalog, register as a schema:
      # spark.sql(f"CREATE TABLE IF NOT EXISTS {{ catalog }}.{{ schema }}.{{ table }} ({schema_ddl})")
    config_mapping:
      schemaName: "schema_name"
      cacheSize: "cache_size"
    notes: "Schema Generator in StreamSets attaches schema metadata to records. In Databricks, manage schemas via Unity Catalog."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.processor.selector.SelectorDProcessor"
    streamsets_label: "Stream Selector"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark filter() per output lane"
    confidence: "high"
    code_template: |
      # Stream Selector → Spark filter per output lane
      # Each lane predicate becomes a separate filtered DataFrame

      df_lane_1 = df.filter("{{ condition_1 }}")
      df_lane_2 = df.filter("{{ condition_2 }}")
      # Default lane (records not matching any condition above):
      df_default = df.filter("NOT ({{ condition_1 }}) AND NOT ({{ condition_2 }})")

      # Translate StreamSets EL predicates to Spark SQL:
      # ${record:value('/status') == 'ACTIVE'} → status = 'ACTIVE'
    config_mapping:
      lanePredicates: "lane_predicates"
    notes: "Each lane becomes a filtered branch. Translate EL predicates to Spark SQL WHERE expressions."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.processor.splitter.SplitterDProcessor"
    streamsets_label: "Field Splitter"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark split() / F.split()"
    confidence: "exact"
    code_template: |
      # Field Splitter → Spark split string into array, then extract elements
      from pyspark.sql.functions import split, col

      # Split a string field into an array:
      df = df.withColumn("{{ field }}_parts", split(col("{{ field }}"), "{{ separator }}"))

      # Extract individual elements into separate columns:
      df = df.withColumn("{{ output_field_1 }}", col("{{ field }}_parts").getItem(0))
      df = df.withColumn("{{ output_field_2 }}", col("{{ field }}_parts").getItem(1))
      # Continue for as many splits as configured
    config_mapping:
      fieldPath: "field"
      separator: "separator"
      fieldPathsForSplits: "output_fields"
    notes: "SplitterDProcessor splits a field value by separator. Use split() and getItem() for each part."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.processor.startJob.StartJobDProcessor"
    streamsets_label: "Start Job (Processor)"
    databricks_equivalent: "custom_python"
    databricks_label: "Databricks Jobs API trigger mid-pipeline"
    confidence: "medium"
    code_template: |
      # Start Job Processor → Databricks Jobs API
      # Triggers a Databricks Job during pipeline execution
      import requests

      job_api_url = (
          dbutils.notebook.entry_point.getDbutils().notebook().getContext().apiUrl().get()
          + "/api/2.1/jobs/run-now"
      )
      token = dbutils.notebook.entry_point.getDbutils().notebook().getContext().apiToken().get()

      response = requests.post(
          job_api_url,
          headers={"Authorization": f"Bearer {token}"},
          json={"job_id": {{ job_id }}, "notebook_params": {{ job_params | default({}) | tojson }}}
      )
      response.raise_for_status()
      print(f"Triggered job {{{ job_id }}}, run_id={response.json()['run_id']}")
    config_mapping:
      conf.jobId: "job_id"
      conf.runParameters: "job_params"
    notes: "Consider Databricks Workflows (DAGs) for orchestration instead of inline job triggers."
    requires_manual_review: false
