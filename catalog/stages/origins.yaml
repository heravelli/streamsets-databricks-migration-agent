  - streamsets_stage: "com.streamsets.pipeline.stage.origin.multikafka.MultiKafkaDSource"
    streamsets_label: "Multi-Topic Kafka Consumer"
    databricks_equivalent: "dlt_streaming_table"
    databricks_label: "Delta Live Tables Streaming Table (multi-topic Kafka)"
    confidence: "exact"
    code_template: |
      import dlt
      from pyspark.sql.functions import col

      # Multi-topic Kafka Consumer → one DLT streaming table per topic
      # Topics: {{ topic_list }}

      {% for topic in topic_list %}
      @dlt.table(
          name="{{ topic | replace('-', '_') | replace('.', '_') }}_raw",
          comment="Migrated from StreamSets Multi-Topic Kafka — topic: {{ topic }}"
      )
      def {{ topic | replace('-', '_') | replace('.', '_') }}_raw():
          return (spark.readStream
                      .format("kafka")
                      .option("kafka.bootstrap.servers", "{{ bootstrap_servers }}")
                      .option("subscribe", "{{ topic }}")
                      .option("startingOffsets", "{{ starting_offsets | default('latest') }}")
                      .load()
                      .selectExpr(
                          "CAST(key AS STRING) AS kafka_key",
                          "CAST(value AS STRING) AS kafka_value",
                          "topic", "partition", "offset",
                          "timestamp AS kafka_timestamp"
                      ))
      {% endfor %}
    config_mapping:
      conf.brokerURI: "bootstrap_servers"
      conf.topicList: "topic_list"
      conf.consumerGroup: "consumer_group"
      conf.kafkaAutoOffsetReset: "starting_offsets"
    notes: "Each topic becomes a separate DLT streaming table. Union downstream if a single stream is needed."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.origin.remote.RemoteDownloadDSource"
    streamsets_label: "SFTP/FTP/FTPS Client (Origin)"
    databricks_equivalent: "custom_python"
    databricks_label: "Python paramiko/ftplib download to DBFS"
    confidence: "medium"
    code_template: |
      # SFTP/FTP Origin → Python download to DBFS then read
      import paramiko
      import io

      ssh = paramiko.SSHClient()
      ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())
      ssh.connect(
          hostname="{{ sftp_host }}",
          port={{ sftp_port | default(22) }},
          username="{{ sftp_user }}",
          password=dbutils.secrets.get("{{ scope }}", "sftp_password")
      )
      sftp = ssh.open_sftp()

      # Download file to DBFS
      local_path = "/dbfs/tmp/{{ remote_file | basename }}"
      sftp.get("{{ remote_path }}/{{ remote_file }}", local_path)
      sftp.close(); ssh.close()

      df = spark.read.format("{{ file_format | default('csv') }}").load(local_path)
    config_mapping:
      remoteConfig.remoteAddress: "sftp_host"
      remoteConfig.username: "sftp_user"
      remoteConfig.remoteDirectory: "remote_path"
    notes: "Install paramiko on the cluster. Consider Azure Data Factory or ADF for managed SFTP ingestion."
    requires_manual_review: false

