    confidence: "medium"
    code_template: |
      # JDBC Tee Processor → Write to JDBC and continue processing
      # Tee = write to a side destination while passing records downstream
      (df.write
         .format("jdbc")
         .option("url", "{{ jdbc_url }}")
         .option("dbtable", "{{ schema }}.{{ table_name }}")
         .option("user", "{{ username }}")
         .option("password", dbutils.secrets.get("{{ scope }}", "{{ secret_key }}"))
         .mode("{{ write_mode | default('append') }}")
         .save())

      # df continues downstream unchanged
    config_mapping:
      hikariConfigBean.connectionString: "jdbc_url"
      tableNameTemplate: "table_name"
    notes: "In Databricks, write to JDBC mid-pipeline then continue with df. For streaming, use foreachBatch."
    requires_manual_review: false

