  - streamsets_stage: "com.streamsets.pipeline.stage.origin.http.HttpClientDSource"
    streamsets_label: "HTTP Client"
    databricks_equivalent: "custom_python"
    databricks_label: "Python requests in Databricks Notebook"
    confidence: "medium"
    code_template: |
      # HTTP Client Origin → Python requests
      import requests
      from pyspark.sql import Row

      response = requests.get(
          url="{{ resource_url }}",
          headers={{ headers | default({}) | tojson }},
          timeout=30
      )
      response.raise_for_status()
      data = response.json()

      # Convert response to Spark DataFrame
      # Adjust based on actual response shape (list of records, nested object, etc.)
      df = spark.createDataFrame([Row(**item) for item in data] if isinstance(data, list) else [Row(**data)])
    config_mapping:
      conf.resourceUrl: "resource_url"
      conf.headers: "headers"
      conf.httpMethod: "http_method"
    notes: "For paginated APIs, implement pagination loop. For streaming, poll via Databricks Job schedule."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.origin.jdbc.JdbcDSource"
    streamsets_label: "JDBC Multitable Consumer"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark JDBC read (multi-table)"
    confidence: "high"
    code_template: |
      # JDBC Multitable Consumer → Spark JDBC read
      jdbc_df = (spark.read
                   .format("jdbc")
                   .option("url", "{{ jdbc_url }}")
                   .option("dbtable", "{{ schema }}.{{ table_name }}")
                   .option("user", "{{ username }}")
                   .option("password", dbutils.secrets.get("{{ scope }}", "{{ secret_key }}"))
                   .option("numPartitions", "{{ num_partitions | default(4) }}")
                   .load())
    config_mapping:
      hikariConfigBean.connectionString: "jdbc_url"
      tableJdbcConfigBean.schema: "schema"
      tableJdbcConfigBean.tablePattern: "table_name"
    notes: "For multitable, loop over table list. Use partitionColumn and bounds for parallel reads."
    requires_manual_review: false

  - streamsets_stage: "com.streamsets.pipeline.stage.origin.jdbc.table.TableJdbcDSource"
    streamsets_label: "JDBC Query Consumer"
    databricks_equivalent: "spark_dataframe"
    databricks_label: "Spark JDBC read with incremental offset"
    confidence: "high"
    code_template: |
      # JDBC Query Consumer → Spark JDBC incremental read
      df = (spark.read
               .format("jdbc")
               .option("url", "{{ jdbc_url }}")
               .option("query",
                       "SELECT * FROM {{ table }} WHERE {{ offset_column }} > {{ last_offset }}")
               .option("user", "{{ username }}")
               .option("password", dbutils.secrets.get("{{ scope }}", "{{ secret_key }}"))
               .load())
      # Track last_offset in a Delta table or Databricks checkpoint for incremental reads
    config_mapping:
      queryConfig.query: "query"
      hikariConfigBean.connectionString: "jdbc_url"
      tableConfigs: "table"
    notes: "Store offset in a Delta table for reliable incremental reads across runs."
    requires_manual_review: false

